openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
paths:
  /analyses/{id}:
    patch:
      operationId: patchAnalysis
      summary: Update analysis with biomechanics data or sport correction
      description: |
        When joint angles/risks are provided (biomechanics scan), enqueues an AI
        analysis job and returns 202. The mobile polling loop continues to GET
        /analyses/:id until status is 'complete'. For sport-only corrections
        (no measured data) returns 200 immediately.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Biomechanics job accepted and queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [processing]
                  improvements:
                    type: array
                    items:
                      type: object
                required: [status]
        "200":
          description: Sport/movement correction applied immediately
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required: [success]
        "409":
          description: Analysis is already being processed (lock held)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required: [error]
        "429":
          description: Rate limit exceeded
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /health/metrics:
    get:
      operationId: healthMetrics
      tags: [health]
      summary: Alert event counters
      description: Returns in-process alert event counters since last process start. Unauthenticated but rate-limited.
      responses:
        "200":
          description: Current alert counters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthMetrics"
        "429":
          description: Rate limit exceeded
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    HealthMetrics:
      type: object
      properties:
        thumbnail_resize_failed:
          type: integer
        alerts:
          type: object
          properties:
            thumbnail_resize_failed:
              type: string
              enum: [ok, warn]
          required:
            - thumbnail_resize_failed
      required:
        - thumbnail_resize_failed
        - alerts

